<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>人生阶段画像器</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #181715;
        --muted: #67615a;
        --paper: #f7f3ec;
        --panel: #fffdf8;
        --line: #d9d0c2;
        --accent: #235347;
        --accent-dark: #173a32;
        --warm: #a54f2b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(90deg, rgba(24, 23, 21, 0.045) 1px, transparent 1px),
          linear-gradient(180deg, rgba(24, 23, 21, 0.035) 1px, transparent 1px),
          var(--paper);
        background-size: 44px 44px;
        color: var(--ink);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei",
          sans-serif;
      }

      main {
        min-height: 100vh;
        display: grid;
        align-items: center;
        padding: 32px 20px;
      }

      .hero {
        width: min(920px, 100%);
        margin: 0 auto;
        display: grid;
        gap: 34px;
      }

      .eyebrow {
        display: inline-flex;
        width: fit-content;
        align-items: center;
        gap: 10px;
        color: var(--accent-dark);
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0;
      }

      .eyebrow::before {
        content: "";
        width: 32px;
        height: 1px;
        background: var(--warm);
      }

      h1 {
        max-width: 820px;
        margin: 0;
        font-size: clamp(42px, 7vw, 82px);
        line-height: 1.04;
        letter-spacing: 0;
      }

      p {
        max-width: 620px;
        margin: 0;
        color: var(--muted);
        font-size: clamp(18px, 2.2vw, 24px);
        line-height: 1.7;
      }

      .actions {
        display: flex;
        align-items: center;
        gap: 18px;
        flex-wrap: wrap;
      }

      .button {
        display: inline-flex;
        min-height: 54px;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--accent);
        border-radius: 8px;
        padding: 0 26px;
        background: var(--accent);
        color: #fffdf8;
        font-size: 17px;
        font-weight: 700;
        text-decoration: none;
        box-shadow: 0 16px 36px rgba(35, 83, 71, 0.2);
        transition:
          transform 160ms ease,
          background 160ms ease,
          box-shadow 160ms ease;
      }

      .button:hover {
        background: var(--accent-dark);
        transform: translateY(-1px);
        box-shadow: 0 18px 42px rgba(23, 58, 50, 0.24);
      }

      .button:focus-visible {
        outline: 3px solid rgba(165, 79, 43, 0.35);
        outline-offset: 4px;
      }

      .note {
        color: var(--muted);
        font-size: 14px;
        line-height: 1.6;
      }

      .meter {
        width: min(520px, 100%);
        height: 8px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: var(--panel);
        overflow: hidden;
      }

      .meter span {
        display: block;
        width: 42%;
        height: 100%;
        background: var(--warm);
      }

      @media (max-width: 640px) {
        main {
          align-items: end;
          padding: 28px 18px 42px;
        }

        .hero {
          gap: 26px;
        }

        h1 {
          font-size: clamp(36px, 12vw, 54px);
        }

        .button {
          width: 100%;
        }

        .note {
          width: 100%;
          text-align: center;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero" aria-labelledby="page-title">
        <div class="eyebrow">人生阶段画像器</div>
        <h1 id="page-title">你不是迷茫，你只是还没看清自己正处在哪个人生阶段</h1>
        <p>回答 15 个问题，生成一份冷静、真实、扎心的人生阶段画像。</p>
        <div class="meter" aria-hidden="true"><span></span></div>
        <div class="actions">
          <a class="button" href="start/">开始测试</a>
          <span class="note">约 3 分钟完成</span>
        </div>
      </section>
    </main>
  </body>
</html>
